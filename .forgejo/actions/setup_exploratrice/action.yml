name: Setup Tricoteuses Tisseuse
description: Install Tricoteuses Tisseuse & create its environment
inputs:
  ASSEMBLEE_DB_PASSWORD:
    description: "Password of Assemblée PostgreSQL database"
    required: true
  LEGI_ANOMALIES_DB_PASSWORD:
    description: "Password of Légifrance Anomalies PostgreSQL database"
    required: true
  LEGI_DB_PASSWORD:
    description: "Password of Légifrance PostgreSQL database"
    required: true
  TISSEUSE_DB_PASSWORD:
    description: "Password of Tisseuse PostgreSQL database"
    required: true
runs:
  using: composite
  steps:
    - name: Install Tricoteuses Exploratrice
      run: npm install
      shell: bash
      working-directory: packages/exploratrice/
    - name: Set Tricoteuses Exploratrice environment
      run: |
        cat > .env << EOF
        # Assemblée PostgreSQL database configuration
        ASSEMBLEE_DB_NAME="assemblee"
        ASSEMBLEE_DB_HOST="${{ vars.ASSEMBLEE_DB_HOST }}"
        ASSEMBLEE_DB_PORT=${{ vars.ASSEMBLEE_DB_PORT }}
        ASSEMBLEE_DB_USER="assemblee"
        ASSEMBLEE_DB_PASSWORD="${{ inputs.ASSEMBLEE_DB_PASSWORD }}"

        # Path of repository containing repository of Assemblée documents
        # in various formats (HTML, PDF, etc)
        ASSEMBLEE_DOCUMENTS_DIR="../../../assemblee-data/Documents/"

        # Légifrance PostgreSQL database configuration
        LEGI_DB_NAME="legi"
        LEGI_DB_HOST="${{ vars.LEGI_DB_HOST }}"
        LEGI_DB_PORT=${{ vars.LEGI_DB_PORT }}
        LEGI_DB_USER="legi"
        LEGI_DB_PASSWORD="${{ inputs.LEGI_DB_PASSWORD }}"

        # Tisseuse PostgreSQL database configuration
        TISSEUSE_DB_NAME="tisseuse"
        TISSEUSE_DB_HOST="${{ vars.TISSEUSE_DB_HOST }}"
        TISSEUSE_DB_PORT=${{ vars.TISSEUSE_DB_PORT }}
        TISSEUSE_DB_USER="tisseuse"
        TISSEUSE_DB_PASSWORD="${{ inputs.TISSEUSE_DB_PASSWORD }}"

        TITLE="Tricoteuses (action)"
        EOF
      shell: bash
      working-directory: packages/exploratrice/
