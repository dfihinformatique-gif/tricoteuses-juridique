version: '3.8'

services:
  moulineuse:
    build:
      context: .
      dockerfile: Dockerfile
    image: moulineuse:latest
    container_name: moulineuse-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Port du serveur
      PORT: 3000
      NODE_ENV: production

      # Configuration Assemblée
      ASSEMBLEE_DB_NAME: ${ASSEMBLEE_DB_NAME:-canutes_assemblee}
      ASSEMBLEE_DB_HOST: ${ASSEMBLEE_DB_HOST:-localhost}
      ASSEMBLEE_DB_PORT: ${ASSEMBLEE_DB_PORT:-5432}
      ASSEMBLEE_DB_USER: ${ASSEMBLEE_DB_USER}
      ASSEMBLEE_DB_PASSWORD: ${ASSEMBLEE_DB_PASSWORD}

      # Configuration Légifrance
      LEGI_DB_NAME: ${LEGI_DB_NAME:-canutes_legifrance}
      LEGI_DB_HOST: ${LEGI_DB_HOST:-localhost}
      LEGI_DB_PORT: ${LEGI_DB_PORT:-5432}
      LEGI_DB_USER: ${LEGI_DB_USER}
      LEGI_DB_PASSWORD: ${LEGI_DB_PASSWORD}

    # Healthcheck
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); });"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    # Limites de ressources (optionnel)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

    # Réseau (si besoin de se connecter à d'autres containers)
    # networks:
    #   - app-network

# networks:
#   app-network:
#     driver: bridge
